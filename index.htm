<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水管排序遊戲</title>
    <style>
    body { 
        font-family: "Microsoft JhengHei", sans-serif; 
        text-align: center; 
        background: #eef2f7; 
        margin: 0; 
        padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px; 
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh; /* 固定高度為視窗高度 */
    }

    h1 { margin: 10px 0 5px; font-size: 1.4rem; flex-shrink: 0; }
    h2 { font-size: 1rem; color: #666; margin-bottom: 10px; flex-shrink: 0; }
    
    #game { 
        display: flex; 
        flex-wrap: wrap; 
        justify-content: center; 
        align-content: center; /* 垂直居中 */
        gap: 15px; 
        padding-top: 40px; 
        max-width: 800px;
        margin: 0 auto;
        flex-grow: 1; /* 讓遊戲區域自動撐開佔據剩餘空間 */
        min-height: 50vh; /* 確保至少佔據一半畫面 */
    }
    
    .tube {
        /* 關鍵修正：寬度與高度隨螢幕高度縮放 */
        width: 12vw; 
        max-width: 65px;
        min-width: 45px;
        height: 35vh; /* 試管高度佔螢幕高度的 35% */
        max-height: 220px;
        
        border: 3px solid #444; 
        border-bottom-left-radius: 25px; 
        border-bottom-right-radius: 25px;
        background: #fff; 
        display: flex; 
        flex-direction: column-reverse;
        cursor: pointer; 
        position: relative; 
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
        z-index: 1;
        overflow: hidden;
        box-sizing: border-box;
        transform-origin: top center;
    }

    /* 選中時浮起距離也改用 vh，確保比例一致 */
    .tube.selected {
        transform: translateY(-5vh);
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        z-index: 10;
    }

    .layer {
        width: 100%;
        height: 25%;
        border-top: 1px solid rgba(255,255,255,0.2);
    }

    .controls { 
        padding: 20px 0;
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-shrink: 0;
    }
    
    button { 
        padding: 12px 0; 
        font-size: 16px; 
        cursor: pointer; 
        border-radius: 30px; 
        border: 2px solid #444; 
        background: white; 
        font-weight: bold;
        width: 120px;
    }

    /* 針對橫向螢幕或較大裝置調整 */
    @media (min-height: 800px) {
        .tube { height: 40vh; }
    }
</style>
      
</head>
<body>

    <h1>倒水排序</h1>
    <h2 id="levelText">Level 1</h2>

    <div id="game"></div>

    <div class="controls">
        <button onclick="undo()">撤銷</button>
        <button onclick="restart()">重玩</button>
    </div>

<script>
    let level = Number(localStorage.getItem("waterSortLevel")) || 1;
    let tubesData = [];
    let history = [];
    let selectedIdx = null;
    let isAnimating = false;

    const COLORS = ["#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6", "#e67e22", "#1abc9c", "#ff66cc", "#7f8c8d", "#34495e"];

    function generateLevel(lvl) {
        let colorCount = Math.min(3 + Math.floor((lvl - 1) / 4), COLORS.length);
        let allColors = [];
        for (let i = 0; i < colorCount; i++) {
            for (let j = 0; j < 4; j++) allColors.push(i);
        }
        allColors.sort(() => Math.random() - 0.5);
        
        let newTubes = [];
        for (let i = 0; i < colorCount; i++) {
            newTubes.push(allColors.slice(i * 4, i * 4 + 4));
        }
        newTubes.push([], []);
        return newTubes;
    }

    function render() {
        const game = document.getElementById("game");
        game.innerHTML = "";
        document.getElementById("levelText").innerText = "Level " + level;

        if (tubesData.length === 0) return;

        tubesData.forEach((tube, i) => {
            let div = document.createElement("div");
            div.className = "tube" + (selectedIdx === i ? " selected" : "");
            div.id = "tube-" + i;
            div.onclick = () => handleTubeClick(i);

            tube.forEach(colorIdx => {
                let layer = document.createElement("div");
                layer.className = "layer";
                layer.style.backgroundColor = COLORS[colorIdx];
                div.appendChild(layer);
            });
            game.appendChild(div);
        });
    }

    async function handleTubeClick(i) {
        if (isAnimating) return;
        if (selectedIdx === null) {
            if (tubesData[i].length > 0) {
                selectedIdx = i;
                render();
            }
        } else {
            if (selectedIdx === i) {
                selectedIdx = null;
                render();
                return;
            }
            if (canPour(selectedIdx, i)) {
                await animatePour(selectedIdx, i);
            } else {
                selectedIdx = tubesData[i].length > 0 ? i : null;
                render();
            }
        }
    }

    function canPour(from, to) {
        let f = tubesData[from], t = tubesData[to];
        if (!f || !t || f.length === 0 || t.length === 4) return false;
        if (t.length === 0) return true;
        return f[f.length - 1] === t[t.length - 1];
    }

    async function animatePour(fromIdx, toIdx) {
        isAnimating = true;
        const fromEl = document.getElementById(`tube-${fromIdx}`);
        const toEl = document.getElementById(`tube-${toIdx}`);
        const fromRect = fromEl.getBoundingClientRect();
        const toRect = toEl.getBoundingClientRect();
        
        history.push(JSON.parse(JSON.stringify(tubesData)));

        const deltaX = toRect.left - fromRect.left;
        const deltaY = toRect.top - fromRect.top - 15; 

        fromEl.style.zIndex = "100";
        fromEl.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(0deg)`;
        await new Promise(r => setTimeout(r, 500)); 

        const rotateDeg = deltaX > 0 ? 85 : -85;
        fromEl.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${rotateDeg}deg)`;
        await new Promise(r => setTimeout(r, 600)); 

        let targetColor = tubesData[fromIdx][tubesData[fromIdx].length - 1];
        while (canPour(fromIdx, toIdx) && tubesData[fromIdx][tubesData[fromIdx].length - 1] === targetColor) {
            tubesData[toIdx].push(tubesData[fromIdx].pop());
        }

        selectedIdx = null;
        render(); 
        
        if (checkWin()) {
            setTimeout(() => {
                level++;
                localStorage.setItem("waterSortLevel", level);
                initGame();
            }, 400);
        }
        isAnimating = false;
    }

    function checkWin() {
        return tubesData.every(t => t.length === 0 || (t.length === 4 && t.every(c => c === t[0])));
    }

    function undo() {
        if (isAnimating || history.length === 0) return;
        tubesData = history.pop();
        selectedIdx = null;
        render();
    }

    function restart() {
        if (isAnimating) return;
        initGame();
    }

    function initGame() {
        tubesData = generateLevel(level);
        history = [];
        selectedIdx = null;
        render();
    }

    initGame();
</script>
</body>
</html>
