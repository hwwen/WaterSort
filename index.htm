<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水管排序遊戲</title>
    <!-- 引入外部 CSS 檔案 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>倒水排序</h1>
    <h2 id="levelText">Level 1</h2>

    <!-- 管理員跳關面板 (透過 Konami Code 解鎖) -->
    <div id="adminPanel">
        🔑 管理員：跳至第 <input type="number" id="targetLevel" min="1" value="1"> 關
        <button id="adminJumpBtn">確認跳轉</button>
    </div>

    <!-- 遊戲試管動態生成區域 -->
    <div id="game"></div>

    <!-- 底部操作按鈕 -->
    <div class="controls">
        <button class="main-btn" id="undoBtn">撤銷</button>
        <button class="main-btn" id="restartBtn">重玩</button>
    </div>

    <!-- 死局救援對話框 (動態注入 Div) -->
    <div id="modalOverlay">
        <div id="modalContent">
            <div class="modal-header">💰 死局救援</div>
            <div class="modal-body">
                目前的局面已無法移動。<br>
                支付 30 金幣在「目前位置」增加一個空瓶嗎？
            </div>
            <div class="modal-footer">
                <button class="btn-pay" id="payBtn">確認支付</button>
                <button class="btn-cancel" id="cancelBtn">不用，我重玩</button>
            </div>
        </div>
    </div>

    <!-- 引入外部 JavaScript 檔案 -->
    <script src="script.js"></script>
</body>
</html>
